kind = "web"
previewPath = "/"
title = "Hospital Command Center"
version = "1.0.0"
id = "artifacts/hospital-command"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24499

[services.development]
run = "pnpm --filter @workspace/hospital-command run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hospital-command", "run", "build" ]
publicDir = "artifacts/hospital-command/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24499"
BASE_PATH = "/"
