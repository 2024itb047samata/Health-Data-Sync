services:
  - type: web
    name: pulseos-api
    runtime: node
    plan: free
    buildCommand: npm i -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pulseos-db
          property: connectionString
      - key: CORS_ORIGIN
        sync: false

databases:
  - name: pulseos-db
    databaseName: pulseos
    user: pulseos
    plan: free
